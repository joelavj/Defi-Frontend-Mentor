<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Bento grid</title>
</head>
<body>
  <div class="div1">
    <h1>Social Media <span>10x</span> <i>Faster</i> with AI</h1>
    <figure>
      <img src="assets/images/illustration-five-stars.webp" alt="cinq étoile">
      <p>Over 4,000 5-star reviews</p>
    </figure>
  </div>
  <div class="div2">
    <img src="assets/images/illustration-multiple-platforms.webp" alt="reseau sociaux">
    <p>Manage multiple accounts and platforms.</p>
  </div>
  <div class="div3">
    <p>Maintain a consistent posting schedule.</p>
    <img src="assets/images/illustration-consistent-schedule.webp">
  </div>
  <div class="div4">
    <p>Schedule to social media.</p>
    <figure>
      <img src="assets/images/illustration-schedule-posts.webp">
      <figcaption>Optimize post timings to publish content at the perfect time for your audience.</figcaption>
    </figure>
  </div>
  <div class="div5">
    <img src="assets/images/illustration-grow-followers.webp">
    <p>Grow followers with non-stop content.</p>
  </div>  
  <div class="div6">
    <p><span>>56%</span> faster audience growth</p>
    <img src="assets/images/illustration-audience-growth.webp">
  </div>
  <div class="div7">
    <p>Create and schedule content <span>quicker.</span></p>
    <img src="assets/images/illustration-create-post.webp">
  </div>
  <div class="div8">
    <p>Write your content using AI.</p>
    <img src="assets/images/illustration-ai-content.webp">
  </div>  
</body>
</html>
